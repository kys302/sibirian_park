<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Каталог плодовых и декоративных растений магазина Сибирский парк.">
  <title>Каталог растений — Сибирский парк</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body data-page="catalog">
  <div class="site-shell">
    <div data-site-header></div>

    <main class="page-main">
      <section class="page-banner">
        <div class="container">
          <p class="eyebrow">Каталог</p>
          <h1>Плодовые и декоративные растения</h1>
          <p>Выбирайте саженцы деревьев, кустарников, хвойных растений и многолетников для частного сада, дачи и озеленения участка.</p>
        </div>
      </section>

      <section class="section">
        <div class="container catalog-layout">
          <aside class="filter-panel card">
            <div class="filter-block">
              <label class="label" for="catalog-search">Поиск по названию</label>
              <input id="catalog-search" class="input" type="search" placeholder="Например, Туя Смарагд">
            </div>

            <div class="filter-block">
              <p class="label">Категория</p>
              <div id="catalog-categories" class="filter-list"></div>
            </div>

            <button id="catalog-reset" class="btn btn-secondary btn-full" type="button">Сбросить фильтры</button>
          </aside>

          <div class="catalog-content">
            <div class="catalog-toolbar card">
              <div>
                <h2>Ассортимент магазина</h2>
                <p id="catalog-summary" class="muted-text">Загрузка каталога...</p>
              </div>
            </div>

            <div id="catalog-grid" class="product-grid"></div>
            <div id="catalog-empty" class="empty-state hidden"></div>
            <div class="load-more-wrap">
              <button id="catalog-load-more" class="btn btn-secondary hidden" type="button">Показать ещё</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
